<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Premium UI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg: linear-gradient(135deg,#0f172a,#1e293b);
  --card: rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --green:#22c55e;
  --red:#ef4444;
  --blue:#38bdf8;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* Layout */
.container{
  max-width:520px;
  margin:auto;
  padding:15px;
}

/* Header */
.header{
  text-align:center;
  margin-bottom:15px;
}
.header h1{
  margin:0;
  font-size:24px;
}
.header p{
  font-size:13px;
  color:#94a3b8;
}

/* Card */
.card{
  background:var(--card);
  backdrop-filter: blur(12px);
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* Inputs */
input,select,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

input,select{
  background:rgba(255,255,255,0.9);
}

button{
  background:linear-gradient(45deg,#3b82f6,#06b6d4);
  color:white;
  font-weight:bold;
}

/* Balance */
.balance{
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* List */
.item{
  background:white;
  color:black;
  padding:10px;
  border-radius:12px;
  margin-top:6px;
  display:flex;
  justify-content:space-between;
}

.green{color:var(--green)}
.red{color:var(--red)}

.small{
  font-size:12px;
  color:#666;
}

/* Section Title */
.section-title{
  font-size:14px;
  margin-bottom:6px;
  color:#cbd5f5;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>🏦 Finance Dashboard</h1>
  <p>ติดตามรายรับ รายจ่าย และกำไรของคุณแบบง่าย ๆ</p>
</div>

<!-- 📘 วิธีใช้ -->
<div class="card">
  <div class="section-title">💡 วิธีใช้งาน</div>
  <p style="font-size:13px;color:#94a3b8">
  1. เพิ่มรายการรายรับหรือรายจ่ายด้านล่าง<br>
  2. เลือกเดือนเพื่อดูสรุป<br>
  3. ดูกราฟเพื่อวิเคราะห์การเงินของคุณ
  </p>
</div>

<!-- INPUT -->
<div class="card">
  <div class="section-title">➕ เพิ่มรายการ</div>

  <input id="name" placeholder="รายการ">
  <input id="amount" type="number" placeholder="จำนวนเงิน">

  <select id="type">
    <option value="income">รายรับ</option>
    <option value="expense">รายจ่าย</option>
  </select>

  <input id="date" type="date">

  <select id="category">
    <option>อาหาร</option>
    <option>เดินทาง</option>
    <option>เงินเดือน</option>
    <option>อื่นๆ</option>
  </select>

  <button onclick="add()">+ เพิ่ม</button>
</div>

<!-- FILTER -->
<div class="card">
  <div class="section-title">🔍 ตัวกรอง</div>

  <input type="month" id="monthFilter" onchange="render()">

  <select id="catFilter" onchange="render()">
    <option value="">ทุกหมวด</option>
    <option>อาหาร</option>
    <option>เดินทาง</option>
    <option>เงินเดือน</option>
    <option>อื่นๆ</option>
  </select>
</div>

<!-- BALANCE -->
<div class="card balance">
💰 เหลือ: <span id="balance">0</span>
</div>

<!-- LIST -->
<div class="card">
  <div class="section-title">📄 รายการ</div>
  <div id="list"></div>
</div>

<!-- CHART -->
<div class="card">
  <div class="section-title">📊 รายรับ vs รายจ่าย</div>
  <canvas id="barChart"></canvas>
</div>

<div class="card">
  <div class="section-title">🍩 หมวดรายจ่าย</div>
  <canvas id="pieChart"></canvas>
</div>

<div class="card">
  <div class="section-title">📈 กำไร / ขาดทุน</div>
  <canvas id="profitChart"></canvas>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("expenses")) || [];
let barChart, pieChart, profitChart;

function save(){
  localStorage.setItem("expenses",JSON.stringify(data));
}

function add(){
  const e={
    name:name.value,
    amount:parseFloat(amount.value),
    type:type.value,
    date:date.value,
    category:category.value
  };

  if(!e.name || !e.amount) return alert("กรอกข้อมูล");

  data.push(e);
  save();

  name.value="";
  amount.value="";
  render();
}

function render(){
  const list=document.getElementById("list");
  list.innerHTML="";

  const mFilter=monthFilter.value;
  const cFilter=catFilter.value;

  let income=0,expense=0;
  let summary={},mIncome={},mExpense={},profitData={};

  data.forEach(e=>{
    if(mFilter && !e.date.startsWith(mFilter)) return;
    if(cFilter && e.category!==cFilter) return;

    const m=e.date?.slice(0,7)||"ไม่ระบุ";

    if(e.type==="income"){
      income+=e.amount;
      mIncome[m]=(mIncome[m]||0)+e.amount;
    }else{
      expense+=e.amount;
      summary[e.category]=(summary[e.category]||0)+e.amount;
      mExpense[m]=(mExpense[m]||0)+e.amount;
    }

    list.innerHTML+=`
    <div class="item">
      <div>
        ${e.name}
        <div class="small">${e.date} • ${e.category}</div>
      </div>
      <div class="${e.type==='income'?'green':'red'}">
        ${e.type==='income'?'+':'-'}${e.amount}
      </div>
    </div>`;
  });

  const months=[...new Set([...Object.keys(mIncome),...Object.keys(mExpense)])];
  months.forEach(m=>{
    profitData[m]=(mIncome[m]||0)-(mExpense[m]||0);
  });

  balance.innerText=income-expense;

  drawBar(months,mIncome,mExpense,profitData);
  drawPie(summary);
  drawProfit(months,profitData);
}

function drawBar(labels,incomeData,expenseData,profitData){
  if(barChart) barChart.destroy();

  barChart=new Chart(barChartCanvas,{
    type:"bar",
    data:{
      labels:labels,
      datasets:[
        {label:"รายรับ",data:labels.map(m=>incomeData[m]||0),backgroundColor:"#22c55e"},
        {label:"รายจ่าย",data:labels.map(m=>expenseData[m]||0),backgroundColor:"#ef4444"},
        {label:"กำไร/ขาดทุน",data:labels.map(m=>profitData[m]||0),
         backgroundColor:labels.map(m=>profitData[m]>=0?"#22c55e":"#ef4444")}
      ]
    }
  });
}

function drawPie(summary){
  if(pieChart) pieChart.destroy();

  pieChart=new Chart(pieChartCanvas,{
    type:"doughnut",
    data:{
      labels:Object.keys(summary),
      datasets:[{data:Object.values(summary)}]
    }
  });
}

function drawProfit(labels,profitData){
  if(profitChart) profitChart.destroy();

  profitChart=new Chart(profitChartCanvas,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"กำไร/ขาดทุน",
        data:labels.map(m=>profitData[m]||0),
        borderColor:"#38bdf8",
        fill:true,
        backgroundColor:labels.map(m=>profitData[m]>=0?
          "rgba(34,197,94,0.2)":"rgba(239,68,68,0.2)")
      }]
    }
  });
}

const barChartCanvas=document.getElementById("barChart");
const pieChartCanvas=document.getElementById("pieChart");
const profitChartCanvas=document.getElementById("profitChart");

render();
</script>

</body>
</html>
