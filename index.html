<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Ultimate</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e5e7eb;
  --green:#22c55e;
  --red:#ef4444;
  --blue:#38bdf8;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:520px;
  margin:auto;
  padding:15px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:12px;
  margin-bottom:12px;
}

input,select,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

button{
  background:#2563eb;
  color:white;
}

.item{
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  margin-top:5px;
  display:flex;
  justify-content:space-between;
}

.green{color:var(--green)}
.red{color:var(--red)}

.balance{
  text-align:center;
  font-size:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>🏦 Finance Dashboard</h2>

<div class="card">
<input id="name" placeholder="รายการ">
<input id="amount" type="number" placeholder="จำนวนเงิน">

<select id="type">
<option value="income">รายรับ</option>
<option value="expense">รายจ่าย</option>
</select>

<input id="date" type="date">

<select id="category">
<option>อาหาร</option>
<option>เดินทาง</option>
<option>เงินเดือน</option>
<option>อื่นๆ</option>
</select>

<button onclick="add()">เพิ่ม</button>
</div>

<div class="card">
<input type="month" id="monthFilter" onchange="render()">
<select id="catFilter" onchange="render()">
<option value="">ทุกหมวด</option>
<option>อาหาร</option>
<option>เดินทาง</option>
<option>เงินเดือน</option>
<option>อื่นๆ</option>
</select>
</div>

<div class="card balance">
💰 เหลือ: <span id="balance">0</span>
</div>

<div class="card" id="list"></div>

<div class="card"><canvas id="barChart"></canvas></div>
<div class="card"><canvas id="pieChart"></canvas></div>
<div class="card"><canvas id="profitChart"></canvas></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("expenses")) || [];
let barChart, pieChart, profitChart;

function save(){
  localStorage.setItem("expenses",JSON.stringify(data));
}

function add(){
  const e={
    name:name.value,
    amount:parseFloat(amount.value),
    type:type.value,
    date:date.value,
    category:category.value
  };

  if(!e.name || !e.amount) return alert("กรอกข้อมูล");

  data.push(e);
  save();

  name.value="";
  amount.value="";

  render();
}

function render(){
  const list=document.getElementById("list");
  list.innerHTML="";

  const mFilter=document.getElementById("monthFilter").value;
  const cFilter=document.getElementById("catFilter").value;

  let income=0, expense=0;
  let summary={};
  let mIncome={}, mExpense={}, profitData={};

  data.forEach(e=>{
    if(mFilter && !e.date.startsWith(mFilter)) return;
    if(cFilter && e.category!==cFilter) return;

    const m = e.date?.slice(0,7) || "ไม่ระบุ";

    if(e.type==="income"){
      income+=e.amount;
      mIncome[m]=(mIncome[m]||0)+e.amount;
    }else{
      expense+=e.amount;
      summary[e.category]=(summary[e.category]||0)+e.amount;
      mExpense[m]=(mExpense[m]||0)+e.amount;
    }

    list.innerHTML+=`
    <div class="item">
      <div>${e.name}<br><small>${e.date} • ${e.category}</small></div>
      <div class="${e.type==='income'?'green':'red'}">
        ${e.type==='income'?'+':'-'}${e.amount}
      </div>
    </div>`;
  });

  const months=[...new Set([...Object.keys(mIncome),...Object.keys(mExpense)])];

  months.forEach(m=>{
    profitData[m]=(mIncome[m]||0)-(mExpense[m]||0);
  });

  balance.innerText = income-expense;

  drawBar(months,mIncome,mExpense,profitData);
  drawPie(summary);
  drawProfit(months,profitData);
}

function drawBar(labels,incomeData,expenseData,profitData){
  if(barChart) barChart.destroy();

  barChart=new Chart(barChartCanvas,{
    type:"bar",
    data:{
      labels:labels,
      datasets:[
        {
          label:"รายรับ",
          data:labels.map(m=>incomeData[m]||0),
          backgroundColor:"#22c55e"
        },
        {
          label:"รายจ่าย",
          data:labels.map(m=>expenseData[m]||0),
          backgroundColor:"#ef4444"
        },
        {
          label:"กำไร/ขาดทุน",
          data:labels.map(m=>profitData[m]||0),
          backgroundColor:labels.map(m=>profitData[m]>=0?"#22c55e":"#ef4444")
        }
      ]
    }
  });
}

function drawPie(summary){
  if(pieChart) pieChart.destroy();

  pieChart=new Chart(pieChartCanvas,{
    type:"doughnut",
    data:{
      labels:Object.keys(summary),
      datasets:[{data:Object.values(summary)}]
    }
  });
}

function drawProfit(labels,profitData){
  if(profitChart) profitChart.destroy();

  profitChart=new Chart(profitChartCanvas,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"กำไร/ขาดทุน",
        data:labels.map(m=>profitData[m]||0),
        borderColor:"#38bdf8",
        fill:true,
        backgroundColor:labels.map(m=>profitData[m]>=0?"rgba(34,197,94,0.2)":"rgba(239,68,68,0.2)")
      }]
    }
  });
}

const barChartCanvas=document.getElementById("barChart");
const pieChartCanvas=document.getElementById("pieChart");
const profitChartCanvas=document.getElementById("profitChart");

render();
</script>

</body>
</html>
