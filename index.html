<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Expense Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: sans-serif;
    margin: 0;
    background: #f0f2f5;
}

.dark {
    background: #1e1e1e;
    color: white;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    background: #4facfe;
    color: white;
    border: none;
}

.item {
    display: flex;
    justify-content: space-between;
    background: #fff;
    padding: 8px;
    border-radius: 8px;
    margin-top: 5px;
}

.dark .item {
    background: #333;
}

.flex {
    display: flex;
    gap: 5px;
}

.total {
    font-weight: bold;
    text-align: center;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h2>💸 Expense Pro</h2>

    <input type="text" id="name" placeholder="รายการ">
    <input type="number" id="amount" placeholder="จำนวนเงิน">
    <input type="date" id="date">

    <select id="category">
        <option>อาหาร</option>
        <option>เดินทาง</option>
        <option>ช้อปปิ้ง</option>
        <option>อื่นๆ</option>
    </select>

    <button onclick="add()">เพิ่ม</button>

    <div class="flex">
        <select id="filter" onchange="render()">
            <option value="all">ทั้งหมด</option>
            <option value="อาหาร">อาหาร</option>
            <option value="เดินทาง">เดินทาง</option>
            <option value="ช้อปปิ้ง">ช้อปปิ้ง</option>
        </select>

        <button onclick="toggleDark()">🌙</button>
        <button onclick="exportCSV()">📤</button>
    </div>

    <div id="list"></div>

    <div class="total">
        รวม: <span id="total">0</span> บาท
    </div>

    <canvas id="chart"></canvas>
</div>

<script>
let data = JSON.parse(localStorage.getItem("expenses")) || [];
let chart;

function save() {
    localStorage.setItem("expenses", JSON.stringify(data));
}

function add() {
    const name = document.getElementById("name").value;
    const amount = parseFloat(document.getElementById("amount").value);
    const date = document.getElementById("date").value;
    const category = document.getElementById("category").value;

    if (!name || !amount) return alert("กรอกข้อมูล");

    data.push({ name, amount, date, category });
    save();
    render();
}

function remove(i) {
    data.splice(i, 1);
    save();
    render();
}

function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    const filter = document.getElementById("filter").value;

    let total = 0;
    let summary = {};

    data.forEach((e, i) => {
        if (filter !== "all" && e.category !== filter) return;

        total += e.amount;
        summary[e.category] = (summary[e.category] || 0) + e.amount;

        list.innerHTML += `
        <div class="item">
            <div>
                ${e.name} (${e.category})<br>
                <small>${e.date}</small>
            </div>
            <div>
                ${e.amount}
                <button onclick="remove(${i})">❌</button>
            </div>
        </div>`;
    });

    document.getElementById("total").innerText = total;

    drawChart(summary);
}

function drawChart(summary) {
    const ctx = document.getElementById("chart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "pie",
        data: {
            labels: Object.keys(summary),
            datasets: [{
                data: Object.values(summary)
            }]
        }
    });
}

function toggleDark() {
    document.body.classList.toggle("dark");
}

function exportCSV() {
    let csv = "name,amount,date,category\n";
    data.forEach(e => {
        csv += `${e.name},${e.amount},${e.date},${e.category}\n`;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "expenses.csv";
    a.click();
}

render();
</script>

</body>
</html>
