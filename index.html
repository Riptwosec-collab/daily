<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Stable</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:#fff;
}
.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}
.card{
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}
input,select,button{
  width:100%;
  padding:10px;
  margin:5px 0;
}
button{background:#2563eb;color:#fff}
.item{
  background:#fff;color:#000;padding:10px;border-radius:8px;margin-top:5px;
  display:flex;justify-content:space-between;
}
</style>
</head>

<body>

<div class="container">

<h2>Finance App</h2>

<div class="card">
<input id="name" placeholder="รายการ">
<input id="amount" type="number" placeholder="จำนวนเงิน">
<select id="type">
<option value="income">รายรับ</option>
<option value="expense">รายจ่าย</option>
</select>
<input id="date" type="date">
<select id="category">
<option>อาหาร</option>
<option>เดินทาง</option>
<option>เงินเดือน</option>
<option>อื่นๆ</option>
</select>
<button onclick="add()">เพิ่ม</button>
</div>

<div class="card">💰 เหลือ: <span id="balance">0</span></div>

<div class="card" id="list"></div>

<div class="card"><canvas id="barChart"></canvas></div>
<div class="card"><canvas id="profitChart"></canvas></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("expenses")) || [];

const nameEl = document.getElementById("name");
const amountEl = document.getElementById("amount");
const typeEl = document.getElementById("type");
const dateEl = document.getElementById("date");
const categoryEl = document.getElementById("category");
const listEl = document.getElementById("list");
const balanceEl = document.getElementById("balance");

const barCanvas = document.getElementById("barChart");
const profitCanvas = document.getElementById("profitChart");

let barChart, profitChart;

// auto date
dateEl.value = new Date().toISOString().split("T")[0];

function save(){
  localStorage.setItem("expenses", JSON.stringify(data));
}

function add(){
  const name = nameEl.value.trim();
  const amount = parseFloat(amountEl.value);
  const date = dateEl.value;

  if(!name || isNaN(amount) || !date){
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  data.push({
    name,
    amount,
    type:typeEl.value,
    date,
    category:categoryEl.value
  });

  save();

  nameEl.value="";
  amountEl.value="";

  render();
}

function render(){
  listEl.innerHTML="";

  let income=0, expense=0;
  let mIncome={}, mExpense={}, profit={};

  data.forEach(e=>{
    const m=e.date.slice(0,7);

    if(e.type==="income"){
      income+=e.amount;
      mIncome[m]=(mIncome[m]||0)+e.amount;
    } else {
      expense+=e.amount;
      mExpense[m]=(mExpense[m]||0)+e.amount;
    }

    listEl.innerHTML+=`
    <div class="item">
      ${e.name}
      <span>${e.type==="income"?"+":"-"}${e.amount}</span>
    </div>`;
  });

  const months=[...new Set([...Object.keys(mIncome),...Object.keys(mExpense)])];

  months.forEach(m=>{
    profit[m]=(mIncome[m]||0)-(mExpense[m]||0);
  });

  balanceEl.innerText = income-expense;

  drawBar(months,mIncome,mExpense);
  drawProfit(months,profit);
}

function drawBar(labels,income,expense){
  if(barChart) barChart.destroy();

  barChart=new Chart(barCanvas,{
    type:"bar",
    data:{
      labels:labels,
      datasets:[
        {label:"รายรับ",data:labels.map(m=>income[m]||0)},
        {label:"รายจ่าย",data:labels.map(m=>expense[m]||0)}
      ]
    }
  });
}

function drawProfit(labels,profit){
  if(profitChart) profitChart.destroy();

  profitChart=new Chart(profitCanvas,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"กำไร",
        data:labels.map(m=>profit[m]||0)
      }]
    }
  });
}

render();
</script>

</body>
</html>
