<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Expense Pro MAX</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:sans-serif; margin:0; background:#f0f2f5; }
.container { max-width:500px; margin:auto; padding:20px; }
input,button,select { width:100%; padding:10px; margin:5px 0; border-radius:8px; }
.item { background:#fff; padding:8px; margin-top:5px; border-radius:8px; display:flex; justify-content:space-between; }
</style>
</head>

<body>

<div class="container">

<h2>💸 Expense Pro MAX</h2>

<div id="auth">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">สมัคร</button>
<button onclick="login()">ล็อกอิน</button>
</div>

<div id="app" style="display:none;">
<button onclick="logout()">ออกจากระบบ</button>

<input id="name" placeholder="รายการ">
<input id="amount" type="number" placeholder="จำนวนเงิน">
<input id="date" type="date">

<select id="category">
<option>อาหาร</option>
<option>เดินทาง</option>
<option>ช้อปปิ้ง</option>
<option>อื่นๆ</option>
</select>

<button onclick="add()">เพิ่ม</button>

<div id="list"></div>

<div>รวม: <span id="total">0</span></div>

<canvas id="chart"></canvas>

</div>

</div>

<script>
// 🔴 ใส่ config ตรงนี้
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let user;
let chart;

// AUTH
function register() {
  auth.createUserWithEmailAndPassword(email.value, password.value);
}

function login() {
  auth.signInWithEmailAndPassword(email.value, password.value);
}

function logout() {
  auth.signOut();
}

auth.onAuthStateChanged(u => {
  if (u) {
    user = u;
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
    load();
  }
});

// ADD DATA
function add() {
  db.collection("expenses").add({
    uid: user.uid,
    name: name.value,
    amount: parseFloat(amount.value),
    date: date.value,
    category: category.value
  });
}

// LOAD DATA
function load() {
  db.collection("expenses")
    .where("uid","==",user.uid)
    .onSnapshot(snapshot => {

      let total = 0;
      let summary = {};
      list.innerHTML = "";

      snapshot.forEach(doc => {
        const e = doc.data();

        total += e.amount;
        summary[e.category] = (summary[e.category] || 0) + e.amount;

        list.innerHTML += `
        <div class="item">
          ${e.name} - ${e.amount}
        </div>`;
      });

      totalEl.innerText = total;
      draw(summary);
    });
}

// CHART
function draw(summary) {
  if (chart) chart.destroy();

  chart = new Chart(chartCanvas, {
    type:"pie",
    data:{
      labels:Object.keys(summary),
      datasets:[{ data:Object.values(summary) }]
    }
  });
}
</script>

</body>
</html>
