<script>
let data = JSON.parse(localStorage.getItem("expenses")) || [];

// ✅ bind DOM ชัดเจน
const nameInput = document.getElementById("name");
const amountInput = document.getElementById("amount");
const typeInput = document.getElementById("type");
const dateInput = document.getElementById("date");
const categoryInput = document.getElementById("category");

const list = document.getElementById("list");
const balance = document.getElementById("balance");

const monthFilter = document.getElementById("monthFilter");
const catFilter = document.getElementById("catFilter");

const barCanvas = document.getElementById("barChart");
const pieCanvas = document.getElementById("pieChart");
const profitCanvas = document.getElementById("profitChart");

// charts
let barChart, pieChart, profitChart;

// auto date
dateInput.value = new Date().toISOString().split("T")[0];

function save(){
  localStorage.setItem("expenses", JSON.stringify(data));
}

function add(){
  const nameVal = nameInput.value.trim();
  const amountVal = parseFloat(amountInput.value);
  const dateVal = dateInput.value;

  if(!nameVal || isNaN(amountVal) || amountVal <= 0 || !dateVal){
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  data.push({
    name: nameVal,
    amount: amountVal,
    type: typeInput.value,
    date: dateVal,
    category: categoryInput.value
  });

  save();

  nameInput.value="";
  amountInput.value="";

  render();
}

function render(){
  list.innerHTML="";

  const mFilter = monthFilter.value;
  const cFilter = catFilter.value;

  let income=0, expense=0;
  let summary={}, mIncome={}, mExpense={}, profitData={};

  data.forEach(e=>{
    if(mFilter && !e.date.startsWith(mFilter)) return;
    if(cFilter && e.category!==cFilter) return;

    const m = e.date.slice(0,7);

    if(e.type==="income"){
      income += e.amount;
      mIncome[m]=(mIncome[m]||0)+e.amount;
    } else {
      expense += e.amount;
      summary[e.category]=(summary[e.category]||0)+e.amount;
      mExpense[m]=(mExpense[m]||0)+e.amount;
    }

    list.innerHTML += `
      <div class="item">
        <div>${e.name}<br><small>${e.date} • ${e.category}</small></div>
        <div style="color:${e.type==='income'?'green':'red'}">
          ${e.type==='income'?'+':'-'}${e.amount}
        </div>
      </div>`;
  });

  const months=[...new Set([...Object.keys(mIncome),...Object.keys(mExpense)])];

  months.forEach(m=>{
    profitData[m]=(mIncome[m]||0)-(mExpense[m]||0);
  });

  balance.innerText = income - expense;

  drawBar(months,mIncome,mExpense,profitData);
  drawPie(summary);
  drawProfit(months,profitData);
}

// ✅ FIX Chart ถูกต้อง
function drawBar(labels,incomeData,expenseData,profitData){
  if(barChart) barChart.destroy();

  barChart = new Chart(barCanvas,{
    type:"bar",
    data:{
      labels:labels,
      datasets:[
        {label:"รายรับ", data:labels.map(m=>incomeData[m]||0), backgroundColor:"#22c55e"},
        {label:"รายจ่าย", data:labels.map(m=>expenseData[m]||0), backgroundColor:"#ef4444"},
        {label:"กำไร", data:labels.map(m=>profitData[m]||0)}
      ]
    }
  });
}

function drawPie(summary){
  if(pieChart) pieChart.destroy();

  pieChart = new Chart(pieCanvas,{
    type:"doughnut",
    data:{
      labels:Object.keys(summary),
      datasets:[{data:Object.values(summary)}]
    }
  });
}

function drawProfit(labels,profitData){
  if(profitChart) profitChart.destroy();

  profitChart = new Chart(profitCanvas,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"กำไร/ขาดทุน",
        data:labels.map(m=>profitData[m]||0),
        borderColor:"#38bdf8"
      }]
    }
  });
}

render();
</script>
