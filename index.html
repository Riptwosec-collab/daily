<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Bank UI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
}

.container{
  max-width:420px;
  margin:auto;
  padding:12px;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
}

.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.stat{
  background:rgba(255,255,255,0.1);
  padding:12px;
  border-radius:14px;
  text-align:center;
}

input,select,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button{
  background:#2563eb;
  color:#fff;
  font-weight:bold;
}

.item{
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  margin-top:6px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="authBox" class="card">
<h3>🔐 Login</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>

<!-- APP -->
<div id="appBox" style="display:none">

<div class="card">
<button onclick="logout()">Logout</button>
</div>

<div class="dashboard">
<div class="stat">รายรับ<br><b id="income">0</b></div>
<div class="stat">รายจ่าย<br><b id="expense">0</b></div>
<div class="stat">คงเหลือ<br><b id="balance">0</b></div>
<div class="stat">งบ<br><input id="budget"></div>
</div>

<div id="alertBox"></div>

<div class="card">
<input id="name" placeholder="รายการ">
<input id="amount" type="number">
<select id="type">
<option value="income">รายรับ</option>
<option value="expense">รายจ่าย</option>
</select>
<input id="date" type="date">
<input id="category" placeholder="หมวด">
<button onclick="add()">+ เพิ่ม</button>
</div>

<div class="card" id="list"></div>

<div class="card"><canvas id="pieChart"></canvas></div>
<div class="card"><canvas id="profitChart"></canvas></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 ใส่ config
const firebaseConfig = { /* YOUR CONFIG */ };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user;

window.login = async ()=>{
  await signInWithEmailAndPassword(auth, email.value, pass.value);
}

window.register = async ()=>{
  await createUserWithEmailAndPassword(auth, email.value, pass.value);
}

window.logout = async ()=>{
  await signOut(auth);
}

onAuthStateChanged(auth,(u)=>{
  if(u){
    user=u;
    authBox.style.display="none";
    appBox.style.display="block";
    load();
  }else{
    authBox.style.display="block";
    appBox.style.display="none";
  }
});

window.add = async ()=>{
  await addDoc(collection(db,"expenses"),{
    uid:user.uid,
    name:name.value,
    amount:parseFloat(amount.value),
    type:type.value,
    date:date.value,
    category:category.value
  });
}

window.del = async (id)=>{
  await deleteDoc(doc(db,"expenses",id));
}

let pie, line;

function load(){
  const q = query(collection(db,"expenses"), where("uid","==",user.uid));

  onSnapshot(q,(snap)=>{

    let income=0,expense=0;
    let summary={}, months={}, profit={};

    list.innerHTML="";

    snap.forEach(d=>{
      const e=d.data();

      const m=e.date?.slice(0,7);

      if(e.type==="income"){
        income+=e.amount;
        months[m]=(months[m]||0)+e.amount;
      }else{
        expense+=e.amount;
        summary[e.category]=(summary[e.category]||0)+e.amount;
        months[m]=(months[m]||0)-e.amount;
      }

      list.innerHTML+=`
      <div class="item">
        ${e.name} (${e.amount})
        <button onclick="del('${d.id}')">ลบ</button>
      </div>`;
    });

    balance.innerText = income-expense;
    incomeEl.innerText = income;
    expenseEl.innerText = expense;

    const budgetVal = parseFloat(budget.value||0);
    alertBox.innerText = (budgetVal && expense>budgetVal) ? "⚠️ เกินงบ!" : "";

    drawPie(summary);
    drawLine(months);
  });
}

function drawPie(summary){
  if(pie) pie.destroy();
  pie = new Chart(pieChart,{
    type:"doughnut",
    data:{labels:Object.keys(summary),datasets:[{data:Object.values(summary)}]}
  });
}

function drawLine(months){
  if(line) line.destroy();
  line = new Chart(profitChart,{
    type:"line",
    data:{labels:Object.keys(months),datasets:[{data:Object.values(months)}]}
  });
}

</script>

</body>
</html>
