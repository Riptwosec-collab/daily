<!-- แทนที่ส่วนแอปเดิมในไฟล์ของคุณ -->
<div id="appBox" style="display:none">
    
    <!-- ส่วนแสดงชื่อผู้ใช้และปุ่ม Logout -->
    <div class="card" style="display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.15);">
        <span id="userDisplay" style="font-size: 0.9rem; font-weight: bold; color: #60a5fa;">👤 กำลังโหลด...</span>
        <button onclick="logout()" style="width: auto; margin: 0; padding: 5px 12px; background: #475569; font-size: 12px;">Logout</button>
    </div>

    <!-- แผงสถิติ -->
    <div class="dashboard">
        <div class="stat">รายรับ<br><b id="incomeVal" style="color: #10b981;">0</b></div>
        <div class="stat">รายจ่าย<br><b id="expenseVal" style="color: #fb7185;">0</b></div>
        <div class="stat">คงเหลือ<br><b id="balanceVal">0</b></div>
        <div class="stat">งบรายจ่าย<br><input id="budget" type="number" placeholder="ตั้งงบ" style="margin:0; padding:2px; text-align:center; background: rgba(0,0,0,0.2); color: white; height: 25px;"></div>
    </div>

    <div id="alertBox" style="text-align: center; font-weight: bold; margin: 5px 0; font-size: 14px;"></div>

    <!-- ฟอร์มเพิ่มรายการ -->
    <div class="card">
        <input id="name" placeholder="ชื่อรายการ (เช่น ค่าข้าว)">
        <input id="amount" type="number" placeholder="จำนวนเงิน">
        <select id="type">
            <option value="income">รายรับ (+)</option>
            <option value="expense" selected>รายจ่าย (-)</option>
        </select>
        <input id="date" type="date">
        <input id="category" placeholder="หมวดหมู่ (เช่น อาหาร, เดินทาง)">
        <button onclick="add()">+ บันทึกรายการ</button>
    </div>

    <!-- รายการที่ถูกเพิ่ม -->
    <h4 style="margin-left: 10px; margin-bottom: 5px;">📜 ประวัติรายการ</h4>
    <div id="list" style="margin-bottom: 20px;"></div>

    <div class="card"><canvas id="pieChart"></canvas></div>
    <div class="card"><canvas id="profitChart"></canvas></div>
</div>
