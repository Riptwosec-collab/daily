<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Pro Stable</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
}

.container{
  max-width:520px;
  margin:auto;
  padding:15px;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  padding:14px;
  border-radius:16px;
  margin-bottom:12px;
}

input,select,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button{
  background:#2563eb;
  color:white;
  font-weight:bold;
}

.balance{
  text-align:center;
  font-size:22px;
}

.item{
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  margin-top:5px;
  display:flex;
  justify-content:space-between;
}

.green{color:#22c55e}
.red{color:#ef4444}
</style>
</head>

<body>

<div class="container">

<h2>🏦 Finance Dashboard</h2>

<!-- ADD -->
<div class="card">
<input id="name" placeholder="รายการ">
<input id="amount" type="number" placeholder="จำนวนเงิน">

<select id="type">
<option value="income">รายรับ</option>
<option value="expense">รายจ่าย</option>
</select>

<input id="date" type="date">

<select id="category">
<option>อาหาร</option>
<option>เดินทาง</option>
<option>เงินเดือน</option>
<option>อื่นๆ</option>
</select>

<button onclick="add()">+ เพิ่ม</button>
</div>

<!-- MONTH SELECT -->
<div class="card">
📅 เลือกเดือนย้อนหลัง
<input type="month" id="monthFilter" onchange="render()">
</div>

<!-- SUMMARY -->
<div class="card balance">
💰 เหลือ: <span id="balance">0</span>
</div>

<div class="card" id="summaryBox"></div>

<!-- LIST -->
<div class="card" id="list"></div>

<!-- CHART -->
<div class="card"><canvas id="barChart"></canvas></div>
<div class="card"><canvas id="profitChart"></canvas></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("expenses")) || [];

const nameEl = document.getElementById("name");
const amountEl = document.getElementById("amount");
const typeEl = document.getElementById("type");
const dateEl = document.getElementById("date");
const categoryEl = document.getElementById("category");

const monthFilter = document.getElementById("monthFilter");

const listEl = document.getElementById("list");
const balanceEl = document.getElementById("balance");
const summaryBox = document.getElementById("summaryBox");

const barCanvas = document.getElementById("barChart");
const profitCanvas = document.getElementById("profitChart");

let barChart, profitChart;

// default date
dateEl.value = new Date().toISOString().split("T")[0];

function save(){
  localStorage.setItem("expenses", JSON.stringify(data));
}

function add(){
  const name = nameEl.value.trim();
  const amount = parseFloat(amountEl.value);
  const date = dateEl.value;

  if(!name || isNaN(amount) || !date){
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  data.push({
    name,
    amount,
    type:typeEl.value,
    date,
    category:categoryEl.value
  });

  save();

  nameEl.value="";
  amountEl.value="";

  render();
}

function render(){
  listEl.innerHTML="";

  const selectedMonth = monthFilter.value;

  let income=0, expense=0;
  let mIncome={}, mExpense={};

  data.forEach(e=>{
    if(selectedMonth && !e.date.startsWith(selectedMonth)) return;

    const m = e.date.slice(0,7);

    if(e.type==="income"){
      income+=e.amount;
      mIncome[m]=(mIncome[m]||0)+e.amount;
    } else {
      expense+=e.amount;
      mExpense[m]=(mExpense[m]||0)+e.amount;
    }

    listEl.innerHTML+=`
    <div class="item">
      <div>${e.name}<br><small>${e.date} • ${e.category}</small></div>
      <div class="${e.type==='income'?'green':'red'}">
        ${e.type==='income'?'+':'-'}${e.amount}
      </div>
    </div>`;
  });

  const profit = income-expense;

  balanceEl.innerText = profit;

  // 📊 summary monthly
  summaryBox.innerHTML = `
    📊 รายรับ: ${income} บาท<br>
    📉 รายจ่าย: ${expense} บาท<br>
    💰 กำไร/ขาดทุน: ${profit} บาท
  `;

  drawBar(Object.keys(mIncome), mIncome, mExpense);
  drawProfit(Object.keys(mIncome), mIncome, mExpense);
}

function drawBar(labels, income, expense){
  if(barChart) barChart.destroy();

  barChart = new Chart(barCanvas,{
    type:"bar",
    data:{
      labels:labels,
      datasets:[
        {label:"รายรับ", data:labels.map(m=>income[m]||0), backgroundColor:"#22c55e"},
        {label:"รายจ่าย", data:labels.map(m=>expense[m]||0), backgroundColor:"#ef4444"}
      ]
    }
  });
}

function drawProfit(labels, income, expense){
  if(profitChart) profitChart.destroy();

  const profitData = labels.map(m=>(income[m]||0)-(expense[m]||0));

  profitChart = new Chart(profitCanvas,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"กำไร/ขาดทุน",
        data:profitData,
        borderColor:"#38bdf8"
      }]
    }
  });
}

render();
</script>

</body>
</html>
